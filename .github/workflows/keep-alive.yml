name: Keep Supabase Alive

on:
  schedule:
    # Runs every 5 days at 00:00 UTC
    - cron: '0 0 */5 * *'
  workflow_dispatch: # allows manual trigger from the Actions tab

jobs:
  ping-database:
    runs-on: ubuntu-latest
    steps:
      - name: Validate DATABASE_URL secret exists
        run: |
          if [ -z "${{ secrets.DATABASE_URL }}" ]; then
            echo "❌ DATABASE_URL secret is missing or empty."
            echo "Go to Settings → Secrets and variables → Actions and add it."
            exit 1
          fi
          echo "✅ DATABASE_URL secret is set."

      - name: Install pg package
        run: npm install pg

      - name: Ping Supabase database
        run: |
          node -e "
          const { Client } = require('pg');
          const client = new Client({
            connectionString: process.env.DATABASE_URL,
            ssl: { rejectUnauthorized: false }
          });
          client.connect()
            .then(() => client.query('SELECT NOW()'))
            .then(res => {
              console.log('✅ Ping successful:', res.rows[0]);
              return client.end();
            })
            .catch(err => {
              console.error('❌ Ping failed:', err.message);
              process.exit(1);
            });
          "
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}